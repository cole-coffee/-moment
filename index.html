<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>(moment)</title>

  <!-- meta -->
  <meta name="description" content="An ambient haiku reader. Nine fragments, scrolled slowly. By Pankti Porecha." />
  <meta name="theme-color" content="#0E0E0E" />
  <meta name="color-scheme" content="dark" />
  <meta name="author" content="Pankti Porecha" />

  <!-- favicon: simple "( )" mark on dark -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%2032%2032'%3E%3Crect%20width%3D'32'%20height%3D'32'%20rx%3D'7'%20fill%3D'%230E0E0E'%2F%3E%3Ctext%20x%3D'16'%20y%3D'22'%20text-anchor%3D'middle'%20font-family%3D'-apple-system%2Csystem-ui%2Csans-serif'%20font-size%3D'18'%20font-weight%3D'300'%20fill%3D'rgba(232%2C230%2C226%2C0.88)'%3E(%20%20)%3C%2Ftext%3E%3C%2Fsvg%3E" />

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600&family=Newsreader:opsz,wght@6..72,200..700&family=DM+Mono:wght@300;400;500&display=swap" />

  <style>
    html, body, #root {
      margin: 0; padding: 0; height: 100%;
      background: #191614;
      overscroll-behavior: none;
    }
    body {
      font-family: 'Manrope', system-ui, sans-serif;
      color: #E8E6E2;
      -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }
    .moment-scroll::-webkit-scrollbar { display: none; }

    @keyframes driftBreath {
      0%, 100% { transform: translateY(0);    opacity: 0.84; }
      50%      { transform: translateY(-2px); opacity: 1; }
    }
    @keyframes driftHint {
      0%, 100% { opacity: 0.40; }
      50%      { opacity: 0.78; }
    }
    @keyframes momentReveal {
      0%   { opacity: 0; filter: blur(2px); }
      100% { opacity: 1; filter: blur(0); }
    }
    @keyframes parenReveal {
      0%   { opacity: 0; }
      55%  { opacity: 0.8; }
      100% { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .fade-block { transition: opacity 200ms linear !important; transform: none !important; }
      .horizon { transition: opacity 200ms linear !important; }
      [style*="driftBreath"], [style*="driftHint"],
      [style*="momentReveal"], [style*="parenReveal"] { animation: none !important; opacity: 1 !important; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="moment.jsx"></script>
</body>
</html>
